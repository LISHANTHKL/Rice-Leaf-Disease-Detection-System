```
<!-- 🌐 LANGUAGE TRANSLATE OPTION -->
<div id="google_translate_element"></div>

<div
  class="container d-flex justify-content-center align-items-center min-vh-100"
>
  <div
    class="card shadow p-4 text-center"
    style="width:420px;border-radius:15px"
  >
    <h3 class="text-success mb-3">🌾 Rice Leaf Disease Detection</h3>

    <p class="text-muted mb-4">
      Upload a rice leaf image to detect disease and get AI-based treatment guidance.
    </p>

    <!-- ❌ ERROR MESSAGE -->
    {% if error %}
    <div class="alert alert-danger text-center">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">

      <input
        class="form-control"
        type="file"
        name="image"
        accept="image/*"
        required
      />

      <div class="d-grid mt-4">
        <button class="btn btn-success btn-lg">
          🔍 Predict Disease
        </button>
      </div>

    </form>

    <p class="text-muted small mt-3">
      Supported formats: JPG, PNG
    </p>

  </div>
</div>

<!-- GOOGLE TRANSLATE SCRIPT -->

<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      {
        pageLanguage: "en",
        includedLanguages: "en,kn,hi",
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      },
      "google_translate_element"
    );
  }
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
